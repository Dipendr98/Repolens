<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f1b35"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="card-clip">
      <rect x="820" y="80" width="400" height="240" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="200" rx="260" ry="180" fill="#1e40af" opacity="0.18" filter="url(#blur)"/>
  <ellipse cx="1050" cy="180" rx="220" ry="160" fill="#0e7490" opacity="0.18" filter="url(#blur)"/>
  <ellipse cx="640" cy="350" rx="300" ry="100" fill="#0369a1" opacity="0.12" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#38bdf8" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- ── LENS ICON ── -->
  <g transform="translate(72, 130)">
    <!-- Outer ring -->
    <circle cx="72" cy="72" r="60" stroke="#38bdf8" stroke-width="3" fill="none" opacity="0.9"/>
    <!-- Glow ring -->
    <circle cx="72" cy="72" r="60" stroke="#22d3ee" stroke-width="8" fill="none" opacity="0.15"/>
    <!-- Inner fill -->
    <circle cx="72" cy="72" r="50" fill="#0c1a3a" opacity="0.9"/>
    <!-- Lens cross-hairs -->
    <line x1="72" y1="18" x2="72" y2="40" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="72" y1="104" x2="72" y2="126" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="18" y1="72" x2="40" y2="72" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <line x1="104" y1="72" x2="126" y2="72" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
    <!-- Chart bars inside lens -->
    <rect x="38" y="82" width="10" height="18" rx="2" fill="#4ade80" opacity="0.9"/>
    <rect x="52" y="68" width="10" height="32" rx="2" fill="#22d3ee" opacity="0.9"/>
    <rect x="66" y="56" width="10" height="44" rx="2" fill="#38bdf8" opacity="0.9"/>
    <rect x="80" y="72" width="10" height="28" rx="2" fill="#818cf8" opacity="0.9"/>
    <rect x="94" y="62" width="10" height="38" rx="2" fill="#4ade80" opacity="0.9"/>
    <!-- Handle -->
    <line x1="118" y1="118" x2="138" y2="138" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="140" cy="140" r="6" fill="#38bdf8" opacity="0.9"/>
  </g>

  <!-- ── TITLE ── -->
  <text x="230" y="182" font-family="'SF Mono', 'Fira Code', monospace" font-size="62" font-weight="700" fill="#f0f9ff" letter-spacing="-2">RepoLens</text>
  <!-- Accent underline -->
  <rect x="230" y="192" width="430" height="3" rx="2" fill="url(#scoreGrad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="232" y="230" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#94a3b8" letter-spacing="0.5">GitHub Repository Intelligence for Claude Code</text>

  <!-- ── BADGE ROW ── -->
  <g transform="translate(232, 258)">
    <!-- Badge 1: Claude Code -->
    <rect width="120" height="26" rx="13" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <text x="60" y="17" font-family="monospace" font-size="11" fill="#7dd3fc" text-anchor="middle" font-weight="600">Claude Code</text>

    <!-- Badge 2: MIT -->
    <rect x="128" width="70" height="26" rx="13" fill="#14532d" stroke="#4ade80" stroke-width="1" opacity="0.9"/>
    <text x="163" y="17" font-family="monospace" font-size="11" fill="#86efac" text-anchor="middle" font-weight="600">MIT</text>

    <!-- Badge 3: 9 Commands -->
    <rect x="206" width="118" height="26" rx="13" fill="#312e81" stroke="#818cf8" stroke-width="1" opacity="0.9"/>
    <text x="265" y="17" font-family="monospace" font-size="11" fill="#c7d2fe" text-anchor="middle" font-weight="600">9 Commands</text>

    <!-- Badge 4: 5 Agents -->
    <rect x="332" width="110" height="26" rx="13" fill="#1c1917" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
    <text x="387" y="17" font-family="monospace" font-size="11" fill="#fcd34d" text-anchor="middle" font-weight="600">5 AI Agents</text>
  </g>

  <!-- ── TERMINAL CARD ── -->
  <rect x="820" y="72" width="410" height="256" rx="14" fill="#0d1117" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="820" y="72" width="410" height="36" rx="14" fill="#161b22"/>
  <rect x="820" y="90" width="410" height="18" fill="#161b22"/>
  <!-- Traffic lights -->
  <circle cx="845" cy="90" r="6" fill="#ff5f56"/>
  <circle cx="863" cy="90" r="6" fill="#ffbd2e"/>
  <circle cx="881" cy="90" r="6" fill="#27c93f"/>
  <!-- Terminal title -->
  <text x="1025" y="95" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">bash — repolens</text>

  <!-- Terminal content -->
  <g font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="12">
    <!-- Prompt line -->
    <text x="840" y="130" fill="#4ade80">❯</text>
    <text x="856" y="130" fill="#e2e8f0">/github analyse supabase/supabase</text>

    <text x="840" y="152" fill="#64748b">Launching 5 parallel agents...</text>

    <!-- Score lines -->
    <text x="840" y="171" fill="#4ade80">✓</text>
    <text x="858" y="171" fill="#94a3b8">Code Quality         </text>
    <text x="1020" y="171" fill="#4ade80">82/100</text>

    <text x="840" y="188" fill="#4ade80">✓</text>
    <text x="858" y="188" fill="#94a3b8">Activity &amp; Health    </text>
    <text x="1020" y="188" fill="#4ade80">91/100</text>

    <text x="840" y="205" fill="#4ade80">✓</text>
    <text x="858" y="205" fill="#94a3b8">Community            </text>
    <text x="1020" y="205" fill="#facc15">78/100</text>

    <text x="840" y="222" fill="#4ade80">✓</text>
    <text x="858" y="222" fill="#94a3b8">Security             </text>
    <text x="1020" y="222" fill="#fb923c">65/100</text>

    <text x="840" y="239" fill="#4ade80">✓</text>
    <text x="858" y="239" fill="#94a3b8">Docs &amp; DX            </text>
    <text x="1020" y="239" fill="#4ade80">87/100</text>

    <!-- Divider -->
    <line x1="838" y1="249" x2="1218" y2="249" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Overall score -->
    <text x="840" y="266" fill="#38bdf8" font-weight="700">Overall Score: </text>
    <text x="958" y="266" fill="#ffffff" font-weight="700">81/100</text>
    <rect x="1005" y="254" width="32" height="17" rx="4" fill="#1e3a5f"/>
    <text x="1021" y="266" fill="#38bdf8" font-weight="700" text-anchor="middle">B</text>

    <!-- Saved -->
    <text x="840" y="306" fill="#64748b">📁 GITHUB-ANALYSIS-supabase.md</text>
  </g>

  <!-- Cursor blink -->
  <rect x="840" y="310" width="8" height="14" rx="1" fill="#4ade80" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="376" width="1280" height="24" fill="#060d1a" opacity="0.8"/>
  <text x="640" y="391" font-family="monospace" font-size="11" fill="#334155" text-anchor="middle" letter-spacing="2">REPOLENS · GITHUB ANALYSER SKILL SUITE · CLAUDE CODE · MIT LICENSE</text>

  <!-- Subtle corner accents -->
  <path d="M0 30 L0 0 L30 0" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M1280 30 L1280 0 L1250 0" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M0 370 L0 400 L30 400" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M1280 370 L1280 400 L1250 400" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
